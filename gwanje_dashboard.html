<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>와플랫 관제 현황 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
:root{--safe:#2563eb;--basic:#16a34a;--mix:#7c3aed;--dispatch:#e11d48;--note:#d97706;
--card:#fff;--line:#e8ecf3;--text:#1e2533;--sub:#6b7488;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard Variable','Pretendard','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
background:linear-gradient(180deg,#eef2fb 0,#f5f7fc 220px,#f5f7fc 100%);color:var(--text);
padding:28px 24px 60px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1200px;margin:0 auto}

.hero{background:linear-gradient(115deg,#4338ca 0%,#2563eb 55%,#0ea5e9 100%);border-radius:22px;
padding:26px 30px;color:#fff;margin-bottom:22px;box-shadow:0 12px 30px -8px rgba(37,99,235,.45);
display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px}
.hero .logo{display:inline-block;font-weight:800;letter-spacing:1.5px;font-size:12px;
background:rgba(255,255,255,.2);padding:5px 11px;border-radius:8px;margin-bottom:10px}
.hero h1{font-size:25px;font-weight:800;letter-spacing:-.5px}
.hero .sub{color:rgba(255,255,255,.88);font-size:13px;margin-top:6px}
.hero .htag{font-size:12px;color:rgba(255,255,255,.9);background:rgba(255,255,255,.14);
padding:8px 14px;border-radius:12px;line-height:1.6}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;
background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;
box-shadow:0 1px 2px rgba(16,24,40,.04)}
.toolbar label{font-size:12px;color:var(--sub);font-weight:700;display:flex;align-items:center;gap:6px}
select,input{padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;background:#fff;color:var(--text)}
select:focus,input:focus{outline:none;border-color:var(--safe);box-shadow:0 0 0 3px rgba(37,99,235,.13)}
input{flex:1;min-width:180px}

.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
.kpi{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;
padding:15px 15px 14px;display:flex;flex-direction:column;gap:9px;
box-shadow:0 1px 2px rgba(16,24,40,.04);transition:transform .14s,box-shadow .14s}
.kpi:hover{transform:translateY(-3px);box-shadow:0 10px 22px -8px rgba(16,24,40,.18)}
.kpi .ic{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:#eef2f7;color:#64748b}
.kpi .ic svg{width:18px;height:18px;stroke-width:2}
.kpi .n{font-size:27px;font-weight:800;line-height:1;letter-spacing:-.5px}
.kpi .l{font-size:12px;color:var(--sub);font-weight:600}
.kpi.safe .ic{background:#e0ecff;color:var(--safe)} .kpi.safe .n{color:var(--safe)}
.kpi.basic .ic{background:#dcfce7;color:var(--basic)} .kpi.basic .n{color:var(--basic)}
.kpi.disp .ic{background:#ffe4e9;color:var(--dispatch)} .kpi.disp .n{color:var(--dispatch)}
.kpi.note .ic{background:#fef3c7;color:var(--note)} .kpi.note .n{color:var(--note)}

.tcard{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(16,24,40,.05)}
table{width:100%;border-collapse:collapse}
thead th{position:sticky;top:0;z-index:1;background:#f7f9fd;font-size:11px;letter-spacing:.2px;
color:var(--sub);font-weight:700;padding:13px 14px;text-align:left;border-bottom:1px solid var(--line);cursor:pointer;user-select:none}
thead th:hover{color:var(--text)}
td{padding:12px 14px;font-size:14px;border-bottom:1px solid #f1f4f9}
td.num,th.num{text-align:center}
tbody tr.agency:last-child td,tbody tr.detail:last-child td{border-bottom:none}
tr.agency{cursor:pointer;transition:background .1s}
tr.agency td:first-child{font-weight:600}
tr.agency:hover{background:#f6faff}
tr.agency.open{background:#eef4ff}
tr.agency.open td:first-child{box-shadow:inset 3px 0 0 var(--safe)}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;margin:1px}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.b-safe{background:#e0ecff;color:#1d4ed8} .b-basic{background:#dcfce7;color:#15803d} .b-mix{background:var(--mix)}
.chip{display:inline-block;min-width:22px;text-align:center;padding:2px 8px;border-radius:8px;font-size:13px;font-weight:700}
.c-safe{background:#e0ecff;color:var(--safe)} .c-basic{background:#dcfce7;color:var(--basic)}
.c-disp{background:#ffe4e9;color:var(--dispatch)} .c-note{background:#fef3c7;color:#b45309}
.zero{color:#cbd5e1;font-weight:600}
.ntot{color:#9ca3af;font-size:11px;margin-left:3px;font-weight:600}

.detail td{padding:0;background:#fafbfe}
.dwrap{padding:14px 20px 18px}
.sec-title{display:flex;align-items:center;gap:6px;font-weight:800;font-size:13px;color:var(--dispatch);margin:2px 0 8px}
.major{border-left:3px solid var(--dispatch);background:#fff6f8;border-radius:0 10px 10px 0;padding:4px 14px 8px;margin-bottom:6px}
.mrow{display:grid;grid-template-columns:160px 120px 90px 1fr;gap:10px;padding:8px 0;border-bottom:1px dashed #e7ebf3;font-size:13px;align-items:start}
.mrow:last-child{border-bottom:none}
.mrow.head{font-weight:700;color:var(--sub);font-size:11px}
.note-c{color:#7c2d12;font-weight:500}
.note-c .seg{position:relative;padding-left:13px;margin:2px 0;line-height:1.45}
.note-c .seg::before{content:'';position:absolute;left:3px;top:7px;width:4px;height:4px;border-radius:50%;background:#d08660}
.note-c .chip+.seg,.note-c .chip~.seg{display:block}
.drow{display:grid;grid-template-columns:170px 70px 1fr;gap:10px;padding:8px 0;border-bottom:1px dashed #e7ebf3;font-size:13px;align-items:start}
.drow:last-child{border-bottom:none}
.drow.head{font-weight:700;color:var(--sub);font-size:11px}
.dchip{cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.dchip:hover{filter:brightness(.95)}
.routine{color:var(--sub)}
.empty{color:var(--basic);font-size:13px;padding:8px 0;font-weight:600}
details.allnotes{margin-top:12px}
details.allnotes summary{display:inline-flex;align-items:center;gap:6px;cursor:pointer;color:var(--safe);
font-size:12px;font-weight:700;padding:8px 13px;background:#eef4ff;border:1px solid #d8e6ff;border-radius:10px;list-style:none}
details.allnotes summary:hover{background:#e2edff}
details.allnotes summary::-webkit-details-marker{display:none}
details.allnotes[open] summary{margin-bottom:8px}
.st-y{color:var(--basic)} .st-n{color:var(--dispatch);font-weight:600}
.legend{font-size:12px;color:var(--sub);margin:16px 4px 0;display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.legend b{color:var(--text)}
.caret{display:inline-block;width:14px;transition:transform .15s;color:var(--sub)}
.open .caret{transform:rotate(90deg);color:var(--safe)}
@media(max-width:760px){.kpis{grid-template-columns:repeat(3,1fr)}.mrow{grid-template-columns:1fr;gap:2px}.hero{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="wrap">
<header class="hero">
  <div>
    <span class="logo">WAPLAT</span>
    <h1>관제 현황 대시보드</h1>
    <div class="sub" id="period"></div>
  </div>
  <div class="htag" id="htag"></div>
</header>

<div class="toolbar">
  <label>주차 <select id="week"></select></label>
  <label>서비스 <select id="svc"><option value="">전체</option></select></label>
  <input id="q" placeholder="지자체 검색…">
</div>

<div class="kpis" id="kpis"></div>

<div class="tcard">
<table id="tbl">
<thead><tr>
  <th data-k="agency">지자체</th><th>서비스</th>
  <th class="num" data-k="checkins">안부확인(건)</th>
  <th class="num" data-k="targets">대상자(명)</th>
  <th class="num" data-k="gwanje">KT관제</th>
  <th class="num" data-k="dispatch">출동</th>
  <th class="num" data-k="note">특이사항</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="legend">
  <span><b>세이프</b> = 작성자가 <b>KT관제사</b>(관제사 개입)</span>
  <span><b>베이직</b> = 작성자가 <b>사람</b>(기관 직접확인)</span>
  <span><span class="chip c-disp">출동</span> = [출동] 태그</span>
  <span><span class="chip c-note">특이</span> = 안부확인 외 특이 코멘트</span>
  <span>건수 단위: (대상자 × 날짜) 1건</span>
</div>
</div>

function isoWeek(d){var dt=new Date(d+'T00:00:00');var day=dt.getDay();dt.setDate(dt.getDate()-day);
  var start=new Date(dt);var end=new Date(dt);end.setDate(end.getDate()+6);

  var ymd=function(x){return x.getFullYear()+'-'+('0'+(x.getMonth()+1)).slice(-2)+'-'+('0'+x.getDate()).slice(-2);};
  return {key:ymd(start),label:f(start)+'~'+f(end)+' 주'};}

function render(){

  var recs=RECORDS.filter(function(r){return !wk||r.wk.key===wk;});
  var map={};
  recs.forEach(function(r){
    var a=r.agency; if(!map[a])map[a]={agency:a,recs:[],orgs:{},gwanje:0,basic:0,dispatch:0,note:0,important:0};
    var g=map[a]; g.recs.push(r); g.orgs[r.org]=1;
    if(r.gwanje)g.gwanje++; if(r.basic)g.basic++; if(r.dispatch)g.dispatch++;
  });
  // services에만 있는 기관(베이직 등)도 0건으로 포함
  Object.keys(SERVICES).forEach(function(a){
    if(!map[a])map[a]={agency:a,recs:[],orgs:{},gwanje:0,basic:0,dispatch:0,note:0,important:0};
  });
  var rows=Object.keys(map).map(function(k){var g=map[k];
    g.checkins=g.recs.length;
    g.targets=Object.keys(g.orgs).length;
    var ng=buildNoteGroups(g.recs);
    g.note=ng.length;
    g.important=ng.filter(isImportant).length;
    g.svc = SERVICES[g.agency] || '';   // 이용자현황 시트의 구분(서비스) 매칭

      if(!isNote(c.comment))return;
      var key=r.mid;
      if(!groups[key])groups[key]={org:r.org,mid:r.mid,dates:{},regs:{},dispatch:false,texts:[],tset:{}};
      var g=groups[key];
      g.dates[r.date]=1;
      g.regs[c.reg.indexOf('관제')>=0?'관제':c.reg]=1;
      if(c.comment.indexOf('[출동]')>=0)g.dispatch=true;
      var t=c.comment.trim();
      if(!g.tset[t]){g.tset[t]=1;g.texts.push(t);}
    });
  });
  return Object.keys(groups).map(function(k){return groups[k];})
    .sort(function(a,b){return a.org.localeCompare(b.org);});
}
// 진짜 중요한 특이사항 판정: 출동/위험 키워드(입원·해지·거부 등)
var CRIT=/입원|병원|응급|119|사망|위독|위중|해지|중단|거부|부재|연락\s*안|연락\s*불|통화\s*안|통화\s*불|전출|낙상|쓰러|단전|단수|위기|불응|악화|중환|요양|치매|안좋|힘들어|불가/;
function isImportant(gr){ return gr.dispatch || gr.texts.some(function(t){return CRIT.test(t);}); }
function noteChip(g){
  if(g.note===0)return '<span class="zero">0</span>';
  if(g.important>0)return '<span class="chip c-disp">⚠'+g.important+'</span>';
  return '<span class="chip c-note">'+g.note+'</span>';
}

// 내용 유사도(한글 2-gram Dice)로 비슷한 코멘트 묶기
function bigrams(s){ s=(s||'').replace(/\[[^\]]*\]/g,'').replace(/[\s.,/()]/g,'');
  var b=[]; for(var i=0;i<s.length-1;i++)b.push(s.substr(i,2)); if(s.length===1)b.push(s); return b; }
function dice(a,b){ var A=bigrams(a),B=bigrams(b); if(!A.length||!B.length)return a===b?1:0;
  var m={}; B.forEach(function(x){m[x]=(m[x]||0)+1;}); var inter=0;
  A.forEach(function(x){if(m[x]>0){inter++;m[x]--;}}); return 2*inter/(A.length+B.length); }
function clusterTexts(texts){
  var cl=[];
  texts.forEach(function(t){
    for(var i=0;i<cl.length;i++){
      if(dice(t,cl[i].rep)>=0.5){ cl[i].n++; if(t.length>cl[i].rep.length)cl[i].rep=t; return; }
    }
    cl.push({rep:t,n:1});
  });
  return cl;
}
var SEP='';
// 코멘트 정리: [태그] 제거 → routine 조각 버림.
// 출동 건은 "무슨 일이 있었는지"가 중요하므로 출동 내용 전체 유지, 일반 특이사항은 앞 첫 조각만.
function cleanNote(t){
  var isDisp=t.indexOf('[출동]')>=0;
  var segs=t.split('/').map(function(s){return s.replace(/\[[^\]]*\]/g,'').replace(/\s+/g,' ').trim();})
    .filter(function(s){return s && ROUTINE.indexOf(s)<0;});
  if(!segs.length)return '';
  return isDisp? segs.join(' · ') : segs[0];
}
function rowsHtml(arr){
  var h='<div class="mrow head"><div>대상자(동/센터)</div><div>기간</div><div>작성자</div><div>특이사항</div></div>';
  arr.forEach(function(gr){
    var ds=Object.keys(gr.dates).sort();
    var dlabel=ds.length>1?(fmtD(ds[0])+'~'+fmtD(ds[ds.length-1])+' ('+ds.length+'일)'):fmtD(ds[0]);
    var regLabel=Object.keys(gr.regs).join(', ');
    var tags=(gr.dispatch?'<span class="chip c-disp" style="margin-right:4px">출동</span>':'');
    var cleaned=gr.texts.map(cleanNote).filter(function(s){return s;});
    var body=clusterTexts(cleaned).map(function(cl){
      return esc(cl.rep)+(cl.n>1?' <span class="ntot">(유사 '+cl.n+'건)</span>':'');
    }).join('<br>');
    if(!body)body='<span class="routine">-</span>';
    h+='<div class="mrow"><div>'+esc(gr.org)+'</div><div>'+dlabel+'</div><div>'+esc(regLabel)+
       '</div><div class="note-c">'+tags+body+'</div></div>';
  });
  return h;
}
function detailHtml(g){
  var h='';
  // 🚨 출동 내용 (있으면 최상단에 무슨 일이 있었는지 표시)
  var disp=[];
  g.recs.forEach(function(r){
    r.comments.forEach(function(c){
      if(c.comment.indexOf('[출동]')>=0)
        disp.push({org:r.org,date:r.date,reason:cleanNote(c.comment)||'(내용 미기재)'});
    });
  });
  if(disp.length){
    h+='<div class="sec-title">🚨 출동 '+disp.length+'건 — 내용</div><div class="major">';
    h+='<div class="drow head"><div>대상자(동/센터)</div><div>날짜</div><div>출동 내용</div></div>';
    disp.forEach(function(d){
      h+='<div class="drow"><div>'+esc(d.org)+'</div><div>'+fmtD(d.date)+'</div><div class="note-c">'+esc(d.reason)+'</div></div>';
    });
    h+='</div>';
  }
  var groups=buildNoteGroups(g.recs);
  if(!groups.length){
    h+= disp.length? '<div class="empty">그 외 특이사항 없음</div>' : '<div class="empty">✓ 특이사항 없음 — 전 대상자 정상 안부확인</div>';
    return h;
  }
  var imp=groups.filter(isImportant);
  h+='<div class="sec-title">⚠ 주요 특이사항 '+imp.length+'건</div>';
  h+= imp.length? '<div class="major">'+rowsHtml(imp)+'</div>' : '<div class="empty">주요 특이사항 없음 (아래 전체에서 확인)</div>';
  h+='<details class="allnotes"><summary>전체 특이사항 '+groups.length+'건 펼쳐보기 ▾</summary>'+rowsHtml(groups)+'</details>';
  return h;
}
['change','input'].forEach(function(ev){
  document.getElementById('week').addEventListener(ev,render);
  document.getElementById('svc').addEventListener(ev,render);
  document.getElementById('q').addEventListener(ev,render);});
render();
</script>
